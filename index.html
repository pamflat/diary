<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>catatan pribadi</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Lora:ital,wght@0,400;0,600;1,400;1,600&display=swap" rel="stylesheet" />
<style>
  /* ── CONFIG: ganti dua baris ini di Cursor ── */
  /* const SUPABASE_URL = 'https://bujyuncxzewbjkynxkxv.supabase.co'; */
  /* const SUPABASE_ANON = 'YOUR_ANON_KEY_HERE'; */
  /* const PW_HASH = 'SHA256_OF_YOUR_PASSWORD_HERE'; */

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --accent: #C4703F;
    --accent-hover: #a85c30;
    --font-mono: 'Space Mono', monospace;
    --font-serif: 'Lora', serif;
  }

  body {
    font-family: var(--font-serif);
    background: #0D0C0B;
    color: #F0EDEA;
    min-height: 100vh;
  }

  /* ── LOCK SCREEN ── */
  #screen-lock {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .lock-box {
    width: 100%;
    max-width: 340px;
    padding: 0 1.5rem;
  }

  .lock-eyebrow {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: .18em;
    text-transform: uppercase;
    color: rgba(240,237,234,.35);
    margin-bottom: 2.5rem;
  }

  .lock-box label {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: .1em;
    text-transform: uppercase;
    color: rgba(240,237,234,.45);
    display: block;
    margin-bottom: .5rem;
  }

  .lock-box input[type="password"] {
    width: 100%;
    background: transparent;
    border: none;
    border-bottom: 0.5px solid rgba(240,237,234,.2);
    outline: none;
    font-family: var(--font-serif);
    font-size: 15px;
    font-style: italic;
    color: #F0EDEA;
    padding: .5rem 0;
    margin-bottom: 1.75rem;
  }

  .lock-box input[type="password"]::placeholder {
    color: rgba(240,237,234,.2);
  }

  .lock-btn {
    width: 100%;
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: .1em;
    padding: .6rem 1rem;
    background: var(--accent);
    color: #fff;
    border: none;
    cursor: pointer;
    border-radius: 2px;
  }

  .lock-btn:hover { background: var(--accent-hover); }
  .lock-btn:disabled { background: rgba(240,237,234,.15); cursor: default; }

  .lock-err {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--accent);
    margin-top: .75rem;
    min-height: 14px;
  }

  /* ── DIARY ── */
  #screen-diary { display: none; max-width: 680px; margin: 0 auto; }

  .d-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 1.25rem 1.5rem 1rem;
    border-bottom: 0.5px solid rgba(240,237,234,.1);
  }

  .d-title {
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: .15em;
    text-transform: uppercase;
    color: rgba(240,237,234,.4);
  }

  .hdr-actions { display: flex; gap: 6px; }

  .icon-btn {
    background: none;
    border: none;
    cursor: pointer;
    color: rgba(240,237,234,.35);
    font-size: 18px;
    padding: 4px;
    line-height: 1;
    font-family: var(--font-mono);
    letter-spacing: .06em;
    font-size: 10px;
    text-transform: uppercase;
  }

  .icon-btn:hover { color: var(--accent); }

  .d-tabs {
    display: flex;
    border-bottom: 0.5px solid rgba(240,237,234,.1);
    padding: 0 1.5rem;
  }

  .d-tab {
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: .08em;
    padding: .75rem 1rem .7rem;
    cursor: pointer;
    border: none;
    background: transparent;
    color: rgba(240,237,234,.3);
    border-bottom: 1.5px solid transparent;
    margin-bottom: -0.5px;
    transition: color .15s;
  }

  .d-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  .d-tab:hover:not(.active) { color: rgba(240,237,234,.6); }

  .sbar {
    padding: .875rem 1.5rem;
    border-bottom: 0.5px solid rgba(240,237,234,.1);
    display: none;
  }

  .sbar.visible { display: block; }

  .sbar input {
    width: 100%;
    background: transparent;
    border: none;
    outline: none;
    font-family: var(--font-serif);
    font-size: 14px;
    font-style: italic;
    color: #F0EDEA;
  }

  .sbar input::placeholder { color: rgba(240,237,234,.25); }

  /* ── WRITE ── */
  .w-panel { padding: 1.5rem; }

  .w-date {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: .12em;
    text-transform: uppercase;
    color: rgba(240,237,234,.3);
    margin-bottom: .75rem;
  }

  .w-area {
    width: 100%;
    min-height: 200px;
    background: transparent;
    border: none;
    outline: none;
    resize: none;
    font-family: var(--font-serif);
    font-size: 15px;
    font-style: italic;
    line-height: 1.85;
    color: #F0EDEA;
  }

  .w-area::placeholder { color: rgba(240,237,234,.2); font-style: italic; }

  .divl {
    width: 32px;
    height: 1px;
    background: var(--accent);
    margin: 1rem 0;
    opacity: .5;
  }

  .w-foot {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .w-cc {
    font-family: var(--font-mono);
    font-size: 10px;
    color: rgba(240,237,234,.3);
  }

  .save-btn {
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: .08em;
    padding: .5rem 1.25rem;
    background: var(--accent);
    color: #fff;
    border: none;
    cursor: pointer;
    border-radius: 2px;
  }

  .save-btn:hover { background: var(--accent-hover); }
  .save-btn:disabled { background: rgba(240,237,234,.1); cursor: default; }

  /* ── ENTRIES ── */
  .e-empty {
    padding: 3rem 1.5rem;
    text-align: center;
    font-style: italic;
    color: rgba(240,237,234,.25);
    font-size: 14px;
  }

  .e-item {
    border-bottom: 0.5px solid rgba(240,237,234,.08);
    padding: 1.25rem 1.5rem;
    cursor: pointer;
    transition: background .1s;
    position: relative;
  }

  .e-item:hover { background: rgba(240,237,234,.03); }

  .e-meta {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: .1em;
    text-transform: uppercase;
    color: rgba(240,237,234,.3);
    margin-bottom: .4rem;
  }

  .e-prev {
    font-size: 14px;
    font-style: italic;
    line-height: 1.6;
    color: rgba(240,237,234,.6);
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .e-del {
    position: absolute;
    top: 1rem;
    right: 1.25rem;
    background: none;
    border: none;
    cursor: pointer;
    color: rgba(240,237,234,.2);
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: .06em;
    opacity: 0;
    transition: opacity .15s;
    padding: 4px;
  }

  .e-item:hover .e-del { opacity: 1; }
  .e-del:hover { color: var(--accent); }

  /* ── DETAIL ── */
  .det-panel { padding: 1.5rem; }

  .det-meta {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: .12em;
    text-transform: uppercase;
    color: rgba(240,237,234,.3);
    margin-bottom: 1.25rem;
    display: flex;
    align-items: center;
    gap: 1rem;
  }

  .btn-back {
    background: none;
    border: none;
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: .08em;
    color: var(--accent);
    cursor: pointer;
    padding: 0;
  }

  .btn-back:hover { text-decoration: underline; }

  .det-body {
    font-size: 15px;
    font-style: italic;
    line-height: 1.9;
    color: #F0EDEA;
    white-space: pre-wrap;
    word-break: break-word;
  }

  /* ── TOAST ── */
  .toast {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: .06em;
    padding: .5rem 1.5rem;
    color: rgba(240,237,234,.4);
    display: none;
    border-bottom: 0.5px solid rgba(240,237,234,.08);
  }

  /* ── SPINNER ── */
  .spinner {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: .08em;
    color: rgba(240,237,234,.25);
    padding: 2rem 1.5rem;
    text-align: center;
  }

  .no-res {
    padding: 2rem 1.5rem;
    text-align: center;
    font-style: italic;
    color: rgba(240,237,234,.25);
    font-size: 13px;
  }
</style>
</head>
<body>

<!-- ── LOCK SCREEN ── -->
<div id="screen-lock">
  <div class="lock-box">
    <div class="lock-eyebrow">catatan pribadi</div>
    <label>password</label>
    <input type="password" id="pw-input" placeholder="···" />
    <button class="lock-btn" id="lock-btn" onclick="handleUnlock()">buka</button>
    <div class="lock-err" id="lock-err"></div>
  </div>
</div>

<!-- ── DIARY ── -->
<div id="screen-diary">
  <div class="d-header">
    <span class="d-title">catatan pribadi</span>
    <div class="hdr-actions">
      <button class="icon-btn" onclick="exportJSON()">export</button>
      <button class="icon-btn" onclick="lockDiary()">kunci</button>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <div class="d-tabs">
    <button class="d-tab active" id="tab-write" onclick="switchTab('write')">tulis</button>
    <button class="d-tab" id="tab-entries" onclick="switchTab('entries')">semua</button>
    <button class="d-tab" id="tab-search" onclick="switchTab('search')">cari</button>
  </div>

  <div class="sbar" id="sbar">
    <input type="text" id="search-input" placeholder="ketik untuk mencari..." oninput="renderSearch()" />
  </div>

  <!-- write -->
  <div id="view-write">
    <div class="w-panel">
      <div class="w-date" id="write-date"></div>
      <textarea class="w-area" id="write-area" placeholder="apa yang terjadi hari ini..." oninput="updateCount()"></textarea>
      <div class="divl"></div>
      <div class="w-foot">
        <span class="w-cc" id="char-count">0 karakter</span>
        <button class="save-btn" id="btn-save" onclick="saveEntry()" disabled>simpan</button>
      </div>
    </div>
  </div>

  <!-- entries -->
  <div id="view-entries" style="display:none">
    <div id="entries-list"></div>
  </div>

  <!-- search -->
  <div id="view-search" style="display:none">
    <div id="search-results"></div>
  </div>

  <!-- detail -->
  <div id="view-detail" style="display:none">
    <div class="det-panel">
      <div class="det-meta">
        <button class="btn-back" onclick="goBack()">← kembali</button>
        <span id="detail-date"></span>
      </div>
      <div class="det-body" id="detail-body"></div>
    </div>
  </div>
</div>

<script>
  // ── CONFIG — ganti tiga baris ini ──
  const SUPABASE_URL  = 'https://bujyuncxzewbjkynxkxv.supabase.co';
  const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJ1anl1bmN4emV3YmpreW54a3h2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI3MjA0NzIsImV4cCI6MjA5ODI5NjQ3Mn0.1MWm-XshkwaPHaM0Ec5YZbtavUOsPTMcMB-hXED6ass';
  const PW_HASH       = '8d969eef6ecad3c29a3a629280e686cf0c3f5d5a86aff3ca12020c923adc6c92';
  // ────────────────────────────────────

  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

  let currentTab = 'write';
  let prevTab    = 'entries';
  let allEntries = [];

  // ── AUTH ──
  async function sha256(str) {
    const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
    return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
  }

  async function handleUnlock() {
    const pw = document.getElementById('pw-input').value;
    if (!pw) return;
    const btn = document.getElementById('lock-btn');
    btn.disabled = true; btn.textContent = '...';
    document.getElementById('lock-err').textContent = '';
    const hash = await sha256(pw);
    if (hash !== PW_HASH) {
      document.getElementById('lock-err').textContent = 'password salah.';
      btn.disabled = false; btn.textContent = 'buka'; return;
    }
    sessionStorage.setItem('diary_auth', '1');
    openDiary();
    btn.disabled = false; btn.textContent = 'buka';
  }

  function lockDiary() {
    sessionStorage.removeItem('diary_auth');
    document.getElementById('screen-diary').style.display = 'none';
    document.getElementById('screen-lock').style.display = 'flex';
    document.getElementById('pw-input').value = '';
    document.getElementById('lock-err').textContent = '';
  }

  function checkSession() {
    if (sessionStorage.getItem('diary_auth') === '1') openDiary();
  }

  // ── DIARY ──
  function openDiary() {
    document.getElementById('screen-lock').style.display = 'none';
    document.getElementById('screen-diary').style.display = 'block';
    setDateLabel();
    switchTab('write');
    fetchEntries();
  }

  function setDateLabel() {
    const now = new Date();
    document.getElementById('write-date').textContent =
      now.toLocaleDateString('id-ID',{weekday:'long',day:'numeric',month:'long',year:'numeric'}).toUpperCase();
  }

  function switchTab(tab) {
    if (tab !== 'detail') prevTab = currentTab;
    currentTab = tab;
    ['write','entries','search','detail'].forEach(t => {
      const v = document.getElementById('view-' + t);
      if (v) v.style.display = t === tab ? 'block' : 'none';
      const b = document.getElementById('tab-' + t);
      if (b) b.classList.toggle('active', t === tab);
    });
    document.getElementById('sbar').classList.toggle('visible', tab === 'search');
    if (tab === 'entries') renderEntries();
    if (tab === 'search') { document.getElementById('search-input').focus(); renderSearch(); }
  }

  function goBack() { switchTab(prevTab); }

  function updateCount() {
    const v = document.getElementById('write-area').value;
    document.getElementById('char-count').textContent = v.length + ' karakter';
    document.getElementById('btn-save').disabled = v.trim().length === 0;
  }

  // ── SUPABASE ──
  async function fetchEntries() {
    const { data, error } = await sb
      .from('diary_entries')
      .select('*')
      .order('created_at', { ascending: false });
    if (error) { showToast('gagal load: ' + error.message); return; }
    allEntries = data || [];
    if (currentTab === 'entries') renderEntries();
    if (currentTab === 'search') renderSearch();
  }

  async function saveEntry() {
    const text = document.getElementById('write-area').value.trim();
    if (!text) return;
    const btn = document.getElementById('btn-save');
    btn.disabled = true; btn.textContent = '...';
    const { data, error } = await sb.from('diary_entries').insert({ text }).select().single();
    if (error) { showToast('gagal simpan: ' + error.message); btn.disabled = false; btn.textContent = 'simpan'; return; }
    allEntries.unshift(data);
    document.getElementById('write-area').value = '';
    updateCount();
    btn.textContent = 'simpan';
    switchTab('entries');
  }

  async function deleteEntry(ev, id) {
    ev.stopPropagation();
    const { error } = await sb.from('diary_entries').delete().eq('id', id);
    if (error) { showToast('gagal hapus.'); return; }
    allEntries = allEntries.filter(e => e.id !== id);
    renderEntries();
  }

  // ── RENDER ──
  function fmtDate(ts) {
    return new Date(ts).toLocaleDateString('id-ID',{weekday:'long',year:'numeric',month:'long',day:'numeric'}).toUpperCase();
  }
  function fmtTime(ts) {
    return new Date(ts).toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'});
  }
  function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

  function entryHTML(e) {
    return `<div class="e-item" onclick="openEntry(${e.id})">
      <div class="e-meta">${fmtDate(e.created_at)} · ${fmtTime(e.created_at)}</div>
      <div class="e-prev">${esc(e.text)}</div>
      <button class="e-del" onclick="deleteEntry(event,${e.id})">hapus</button>
    </div>`;
  }

  function renderEntries() {
    const c = document.getElementById('entries-list');
    if (!allEntries.length) { c.innerHTML = '<div class="e-empty">belum ada catatan.</div>'; return; }
    c.innerHTML = allEntries.map(entryHTML).join('');
  }

  function renderSearch() {
    const q = document.getElementById('search-input').value.trim().toLowerCase();
    const c = document.getElementById('search-results');
    if (!q) { c.innerHTML = '<div class="no-res">ketik untuk mencari.</div>'; return; }
    const res = allEntries.filter(e => e.text.toLowerCase().includes(q));
    if (!res.length) { c.innerHTML = '<div class="no-res">tidak ditemukan.</div>'; return; }
    c.innerHTML = res.map(entryHTML).join('');
  }

  function openEntry(id) {
    const e = allEntries.find(x => x.id === id);
    if (!e) return;
    document.getElementById('detail-date').textContent = fmtDate(e.created_at) + ' · ' + fmtTime(e.created_at);
    document.getElementById('detail-body').textContent = e.text;
    switchTab('detail');
  }

  // ── EXPORT ──
  function exportJSON() {
    if (!allEntries.length) { showToast('tidak ada catatan.'); return; }
    const blob = new Blob([JSON.stringify(allEntries, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'diary-' + new Date().toISOString().slice(0,10) + '.json';
    a.click();
    URL.revokeObjectURL(url);
    showToast('export selesai.');
  }

  // ── TOAST ──
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.style.display = 'block';
    setTimeout(() => { t.style.display = 'none'; }, 3000);
  }

  // ── INIT ──
  document.getElementById('pw-input').addEventListener('keydown', e => { if (e.key === 'Enter') handleUnlock(); });
  checkSession();
</script>
</body>
</html>
